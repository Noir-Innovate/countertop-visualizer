<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 650" width="100%" height="100%" style="background-color: #f4f6f9; font-family: 'Segoe UI', Helvetica, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#d32f2f" />
    </marker>
    
    <pattern id="granite" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#e9ecef" />
      <circle cx="5" cy="5" r="1" fill="#ced4da" />
      <circle cx="15" cy="12" r="1.5" fill="#adb5bd" />
      <circle cx="8" cy="18" r="0.8" fill="#6c757d" />
      <circle cx="18" cy="4" r="1.2" fill="#495057" />
    </pattern>
  </defs>

  <rect x="20" y="20" width="810" height="60" fill="#2c3e50" rx="5" />
  <text x="40" y="55" fill="#ffffff" font-size="24" font-weight="bold" letter-spacing="1">PROJECT TAKEOFF: KITCHEN COUNTERTOPS</text>
  <text x="650" y="45" fill="#ffffff" font-size="12">EST. TOTAL: ~56 SQ FT</text>
  <text x="650" y="60" fill="#aab7c4" font-size="10">MATERIAL: QUARTZ / GRANITE</text>

  <rect x="120" y="250" width="252" height="144" fill="url(#granite)" stroke="#2c3e50" stroke-width="3" rx="2" />
  <text x="246" y="325" fill="#2c3e50" font-size="16" font-weight="bold" text-anchor="middle">ISLAND</text>
  <text x="246" y="345" fill="#495057" font-size="12" text-anchor="middle">~ 28.0 SQ FT</text>

  <rect x="120" y="120" width="54" height="76.5" fill="url(#granite)" stroke="#2c3e50" stroke-width="3" rx="2" />
  <text x="147" y="155" fill="#2c3e50" font-size="12" font-weight="bold" text-anchor="middle">STOVE</text>
  <text x="147" y="170" fill="#2c3e50" font-size="12" font-weight="bold" text-anchor="middle">LEFT</text>

  <rect x="174" y="120" width="90" height="76.5" fill="none" stroke="#adb5bd" stroke-width="2" stroke-dasharray="5,5" />
  <text x="219" y="162" fill="#adb5bd" font-size="14" font-weight="bold" text-anchor="middle">STOVE</text>

  <rect x="264" y="120" width="108" height="76.5" fill="url(#granite)" stroke="#2c3e50" stroke-width="3" rx="2" />
  <text x="318" y="155" fill="#2c3e50" font-size="12" font-weight="bold" text-anchor="middle">STOVE RIGHT</text>

  <path d="M 680 120 L 603.5 120 L 603.5 300 C 500 330, 500 480, 680 480 Z" fill="url(#granite)" stroke="#2c3e50" stroke-width="3" />
  <text x="640" y="300" fill="#2c3e50" font-size="16" font-weight="bold" text-anchor="middle" transform="rotate(90 640 300)">SINK / PENINSULA RUN</text>
  <text x="615" y="300" fill="#495057" font-size="12" text-anchor="middle" transform="rotate(90 615 300)">~ 18.7 SQ FT</text>

  <rect x="615" y="160" width="45" height="80" rx="8" fill="#f4f6f9" stroke="#2c3e50" stroke-width="2" stroke-dasharray="4" />
  <text x="637.5" y="200" fill="#d32f2f" font-size="10" font-weight="bold" text-anchor="middle" transform="rotate(90 637.5 200)">SINK CUT</text>

  <line x1="120" y1="415" x2="372" y2="415" stroke="#d32f2f" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="246" y="435" fill="#d32f2f" font-size="14" font-weight="bold" text-anchor="middle">84"</text>
  <line x1="100" y1="250" x2="100" y2="394" stroke="#d32f2f" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="90" y="327" fill="#d32f2f" font-size="14" font-weight="bold" text-anchor="end">48"</text>

  <line x1="120" y1="105" x2="174" y2="105" stroke="#d32f2f" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="147" y="95" fill="#d32f2f" font-size="12" font-weight="bold" text-anchor="middle">18"</text>

  <line x1="264" y1="105" x2="372" y2="105" stroke="#d32f2f" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="318" y="95" fill="#d32f2f" font-size="12" font-weight="bold" text-anchor="middle">36"</text>

  <line x1="390" y1="120" x2="390" y2="196.5" stroke="#d32f2f" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="398" y="162" fill="#d32f2f" font-size="12" font-weight="bold" text-anchor="start">25.5"</text>

  <line x1="585" y1="120" x2="585" y2="300" stroke="#d32f2f" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="575" y="210" fill="#d32f2f" font-size="12" font-weight="bold" text-anchor="end">~ 60" (Straight Run)</text>

  <path d="M 520 405 L 560 405" stroke="#d32f2f" stroke-width="1.5" marker-start="url(#arrow)" />
  <text x="510" y="410" fill="#d32f2f" font-size="12" font-weight="bold" text-anchor="end">Curved Overhang Extends ~ 42"</text>

  <rect x="20" y="520" width="810" height="110" fill="#ffffff" stroke="#ced4da" stroke-width="1" rx="5" />
  <text x="40" y="550" fill="#2c3e50" font-size="14" font-weight="bold">FABRICATION NOTES:</text>
  <text x="40" y="575" fill="#495057" font-size="12">• Dimensions are approximations based on photographic analysis and standard cabinet depths.</text>
  <text x="40" y="595" fill="#495057" font-size="12">• An in-home laser template is required to finalize exact sq ft, overhang radii, and wall scribing.</text>
  <text x="40" y="615" fill="#495057" font-size="12">• Includes 1x undermount sink cutout. Verify if stove is slide-in (requires notch) or freestanding.</text>
</svg>